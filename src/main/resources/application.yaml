spring:
  application:
    name: image-processing-system

  sql:
    init:
      mode: always

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/realteeth_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: image-worker-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

external:
  mock-worker:
    base-url: https://dev.realteeth.ai/mock
    api-key: ${MOCK_API_KEY:mock_a50be8af6aa4467cbdaec4881d53591e}
